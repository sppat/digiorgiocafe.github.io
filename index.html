<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Di Giorgio</title>
		<link href="index.css" rel="stylesheet" />
	</head>
	<body>
		<header>
			<div class="logo-container">
				<img
					src="assets/images/Caffé Di Giorgio logo design.png"
					alt="Caffé Di Giorgio Logo"
					class="logo"
				/>
			</div>
		</header>
		<main>
			<section class="title-section">
				<div class="title-container">
					<div class="title-background">
						<h1 class="title"><em>Coffee done right...</em></h1>
						<p><em>Roasted and brewed to perfection</em></p>
					</div>
				</div>
			</section>
			<section class="products">
				<div class="products-container">
					<div class="product">
						<img
							src="assets/images/cappuccino.jpg"
							alt="Cappuccino"
							class="product-image"
						/>
						<h2 class="product-name"><em>Coffee</em></h2>
					</div>
					<div class="product">
						<img
							src="assets/images/cereal_bar.jpg"
							alt="Cereal Bar"
							class="product-image"
						/>
						<h2 class="product-name"><em>Snacks</em></h2>
					</div>
					<div class="product">
						<img
							src="assets/images/soda_can.jpg"
							alt="Soda Can"
							class="product-image"
						/>
						<h2 class="product-name"><em>Soda</em></h2>
					</div>
				</div>
			</section>
			<section class="map">
				<div class="info-container">
					<div class="map-container">
						<iframe
							src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3142.363435776426!2d23.69312427687394!3d38.03861719691646!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14a1a3df206cd54d%3A0x900d9e8355a1e2f6!2zRGktR2lvcmdpbyBjYWZmZSDOis67zrnOv869!5e0!3m2!1sen!2sgr!4v1775420956403!5m2!1sen!2sgr"
							width="100%"
							height="100%"
							style="border: 0"
							allowfullscreen=""
							loading="lazy"
							referrerpolicy="no-referrer-when-downgrade"
						></iframe>
					</div>
					<div class="opening-hours">
						<table>
							<tr>
								<th colspan="2">Opening Hours</th>
								<th></th>
							</tr>
							<tr>
								<td class="opening-day">Monday - Friday</td>
								<td>07:00 AM - 08:00 PM</td>
							</tr>
							<tr>
								<td class="opening-day">Saturday</td>
								<td>08:00 AM - 01:00 PM</td>
							</tr>
							<tr>
								<td class="opening-day">Sunday</td>
								<td>09:00 AM - 01:00 PM</td>
							</tr>
						</table>
					</div>
				</div>
			</section>
		</main>
		<footer>
			<p>&copy; 2026 Di Giorgio. All rights reserved.</p>
			<p>Follow us on social media! <a href="#">FB</a></p>
		</footer>
	</body>
</html>
